<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PeopleGraph favicon</title>
  <desc id="desc">A cyan-to-emerald circular people graph icon on a transparent background.</desc>
  <defs>
    <linearGradient id="peoplegraphGradient" x1="116" y1="96" x2="396" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38D9FF"/>
      <stop offset="0.48" stop-color="#16F4CF"/>
      <stop offset="1" stop-color="#10F07A"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.95 0 0 0 0 0.78 0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#softGlow)" stroke="url(#peoplegraphGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer connection ring -->
    <path d="M256 88C340.5 88 409 156.5 409 241C409 324.8 341.6 392.9 258.1 394"/>
    <path d="M253.9 394C170.4 392.9 103 324.8 103 241C103 156.5 171.5 88 256 88"/>

    <!-- Network nodes -->
    <circle cx="256" cy="88" r="28"/>
    <circle cx="103" cy="325" r="28"/>
    <circle cx="409" cy="325" r="28"/>

    <!-- Radar / identity arcs -->
    <path d="M158 268C158 213.9 201.9 170 256 170C310.1 170 354 213.9 354 268"/>
    <path d="M199 246C207.6 222.7 230 206 256 206C282 206 304.4 222.7 313 246"/>

    <!-- Person mark -->
    <circle cx="256" cy="247" r="45"/>
    <path d="M172 382C177.4 329.5 211.2 300 256 300C300.8 300 334.6 329.5 340 382"/>
  </g>
</svg>
