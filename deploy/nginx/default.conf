upstream peoplegraph_frontend {
    server frontend:3000;
}

upstream peoplegraph_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location /api/ {
        proxy_pass http://peoplegraph_backend;
    }

    location /django-static/ {
        proxy_pass http://peoplegraph_backend;
    }

    # Keep this path aligned with DJANGO_ADMIN_URL_PATH in .env.production.
    location /private-admin-path/ {
        proxy_pass http://peoplegraph_backend;
    }

    location / {
        proxy_pass http://peoplegraph_frontend;
    }
}
